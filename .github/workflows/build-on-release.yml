name: Build Ember on Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          ls /Applications | grep -i xcode
          sudo xcode-select -s /Applications/Xcode_16.2.app || \
          sudo xcode-select -s /Applications/Xcode_16.1.app || \
          sudo xcode-select -s /Applications/Xcode_16.0.app
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install iOS platform
        run: xcodebuild -downloadPlatform iOS

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift package dependencies
        run: xcodebuild -resolvePackageDependencies -project Ember.xcodeproj -scheme Ember

      - name: Create output directory
        run: mkdir -p artifacts

      # ── iOS build ──
      - name: Build iOS app (no code signing)
        run: |
          xcodebuild \
            -project Ember.xcodeproj \
            -scheme Ember \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM= \
            clean build

      - name: Zip iOS app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name 'Ember.app' -path '*Release-iphoneos*' | head -1)
          echo "Found iOS app at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/artifacts/Ember-iOS-${{ github.event.release.tag_name }}.zip" Ember.app

      # ── Mac Catalyst build ──
      - name: Build Mac Catalyst app (no code signing)
        run: |
          xcodebuild \
            -project Ember.xcodeproj \
            -scheme Ember \
            -configuration Release \
            -destination 'platform=macOS,variant=Mac Catalyst' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM= \
            clean build

      - name: Zip Catalyst app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name 'Ember.app' -path '*Release-maccatalyst*' | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name 'Ember.app' -path '*Build/Products*' | grep -v iphoneos | head -1)
          fi
          echo "Found Catalyst app at: $APP_PATH"
          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/artifacts/Ember-macOS-${{ github.event.release.tag_name }}.zip" Ember.app

      # ── Upload & release ──
      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ember-iOS-${{ github.event.release.tag_name }}
          path: artifacts/Ember-iOS-${{ github.event.release.tag_name }}.zip
          retention-days: 30

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ember-macOS-${{ github.event.release.tag_name }}
          path: artifacts/Ember-macOS-${{ github.event.release.tag_name }}.zip
          retention-days: 30

      - name: Attach zips to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Ember-iOS-${{ github.event.release.tag_name }}.zip
            artifacts/Ember-macOS-${{ github.event.release.tag_name }}.zip
          tag_name: ${{ github.event.release.tag_name }}